{% extends "base.html" %}

{% block title %}Login - K3 Multi Solution{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <div class="text-center mb-3">
                    <i class="fa-solid fa-mobile-screen-button fa-3x text-primary"></i>
                    <h3 class="mt-2">Login with Mobile Number</h3>
                    <p class="text-muted">We'll send you an OTP to verify</p>
                </div>

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-control" name="mobile"
                               pattern="[0-9]{10}" placeholder="10-digit mobile number" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send OTP</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
